name: Playwright Tests

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main
jobs:
  test:
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Nakshtr@2006
          MYSQL_DATABASE: hams_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Test Repository
        uses: actions/checkout@v4

      - name: Checkout Backend Repository
        uses: actions/checkout@v4
        with:
          repository: Nakshtr2006/hams
          path: backend

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -uroot -phidden --silent
          do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Start Spring Boot Backend
        run: |
          cd backend
          chmod +x mvnw
          SPRING_PROFILES_ACTIVE=test ./mvnw spring-boot:run > backend.log 2>&1 &

          for i in {1..24}; do
            if curl -s http://localhost:8080/login.html > /dev/null; then
              echo "Backend started!"
              sleep 5
              cat backend.log
              exit 0
            fi

            echo "Waiting for backend..."
            sleep 5
          done

          echo "Backend failed to start"
          cat backend.log
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/